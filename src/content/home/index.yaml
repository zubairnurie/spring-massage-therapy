storyTitleEn: The yellow little castle
storyTitleFr: Le petit château jaune
storyBodyEn: >-
  The studio is tucked away in a magical corner of the city — a heritage manor
  from around 1840, surrounded by greenery in the heart of downtown Montréal.


  Time-worn stone, tall windows, and peaceful energy woven into the very walls.
  It is a place where history, nature, and care come together to hold sanctuary.
