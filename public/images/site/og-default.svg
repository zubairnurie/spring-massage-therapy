<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!--
    Default social share image for Spring Massage Therapy.
    1200×630 — the size Open Graph and Twitter cards expect.

    Uses the site's design tokens:
      stone-50  #FAF7F2  background
      stone-700 #2E2A22  primary text
      coral-400 #ED8569  accent + sprig
      moss-300  #97A879  secondary leaf

    Replace this with a real photo (1200×630 export from Zarah's studio)
    via Keystatic → Site Branding → Social share image. This is the fallback.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F1ECE2"/>
      <stop offset="100%" stop-color="#FAF7F2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Soft botanical motif, off to the right -->
  <g opacity="0.28" stroke="#97A879" stroke-width="2" fill="none" stroke-linecap="round">
    <!-- Branch stem -->
    <path d="M 990 90 Q 1010 220 1040 360 Q 1060 460 1080 540"/>
    <!-- Leaves -->
    <path d="M 1010 180 Q 970 170 950 200 Q 980 215 1015 200" fill="#97A879" fill-opacity="0.18"/>
    <path d="M 1025 250 Q 1075 240 1095 270 Q 1065 285 1030 270" fill="#97A879" fill-opacity="0.18"/>
    <path d="M 1040 330 Q 1000 320 980 350 Q 1010 365 1045 350" fill="#97A879" fill-opacity="0.18"/>
    <path d="M 1055 410 Q 1105 400 1125 430 Q 1095 445 1060 430" fill="#97A879" fill-opacity="0.18"/>
    <path d="M 1070 490 Q 1030 480 1010 510 Q 1040 525 1075 510" fill="#97A879" fill-opacity="0.18"/>
  </g>

  <!-- Botanical motif, lower-left -->
  <g opacity="0.22" stroke="#97A879" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M 80 540 Q 110 460 170 410"/>
    <path d="M 130 480 Q 100 470 85 495 Q 110 505 135 495" fill="#97A879" fill-opacity="0.18"/>
    <path d="M 155 440 Q 185 430 200 455 Q 175 465 150 455" fill="#97A879" fill-opacity="0.18"/>
  </g>

  <!-- Centered eyebrow -->
  <text x="160" y="240" font-family="'Caveat', cursive, serif" font-size="42" fill="#ED8569">
    A peaceful retreat in
  </text>

  <!-- Main title -->
  <text x="160" y="340" font-family="'Cormorant Garamond', Georgia, serif" font-weight="500" font-size="92" fill="#2E2A22" letter-spacing="-1">
    Spring Massage
  </text>
  <text x="160" y="430" font-family="'Cormorant Garamond', Georgia, serif" font-weight="500" font-size="92" fill="#2E2A22" letter-spacing="-1">
    Therapy
  </text>

  <!-- Coral hairline -->
  <line x1="160" y1="470" x2="260" y2="470" stroke="#ED8569" stroke-width="2"/>

  <!-- Subline -->
  <text x="160" y="510" font-family="'Cormorant Garamond', Georgia, serif" font-style="italic" font-size="28" fill="#564A35">
    Montréal · Open every day · 8 AM – 9 PM
  </text>

  <!-- Brand mark, bottom-left -->
  <g transform="translate(160 560)">
    <text font-family="'Cormorant Garamond', Georgia, serif" font-size="22" fill="#7C6E52" letter-spacing="3">
      SPRINGMASSAGETHERAPY.CA
    </text>
  </g>
</svg>
